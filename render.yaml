services:
  - type: web
    name: portfolio
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      # Set the rest in the Render dashboard (do NOT commit secrets):
      #   DATABASE_URL
      #   NEXTAUTH_URL
      #   NEXTAUTH_SECRET
      #   REDIS_URL
      #   ADMIN_EMAIL
      #   EMAIL_FROM
      #   SITE_URL
      #   GITHUB_ID, GITHUB_SECRET (if used)
      #   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET (if used)
      #   RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET, RAZORPAY_WEBHOOK_SECRET
      #   SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS
      #   NEXT_PUBLIC_POSTHOG_KEY, NEXT_PUBLIC_POSTHOG_HOST
      #   GEMINI_API_KEY
      #   LEETCODE_USERNAME, CODEFORCES_HANDLE, GITHUB_USERNAME, GITHUB_TOKEN (optional)
